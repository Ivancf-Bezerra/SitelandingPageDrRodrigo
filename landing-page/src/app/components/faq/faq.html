<section id="faq" class="py-20 lg:py-28" style="background: linear-gradient(180deg, #0F1F3D 0%, #060E1A 100%)">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section Header -->
    <div class="mb-12">
      <div class="flex items-center gap-3 mb-3">
        <div class="gold-rule"></div>
        <span class="text-gold text-[10px] font-semibold tracking-[0.3em] uppercase">Tire suas dúvidas</span>
      </div>
      <h2 class="text-2xl sm:text-3xl font-bold text-white" style="font-family: var(--font-serif)">
        Perguntas <span class="text-gold">Frequentes</span>
      </h2>
    </div>

    <!-- Accordion -->
    <div role="list">
      @for (item of itens(); track $index) {
        <div class="border-b border-gold/10 last:border-b-0" role="listitem">
          <button
            class="w-full flex items-center justify-between px-0 py-4 text-left gap-4 hover:text-gold transition-colors duration-200 group"
            (click)="toggle($index)"
            [attr.aria-expanded]="item.aberto"
          >
            <span
              class="text-xs sm:text-sm font-medium transition-colors duration-200"
              [class.text-gold]="item.aberto"
              [class.text-slate-300]="!item.aberto"
            >
              {{ item.pergunta }}
            </span>
            <span
              class="flex-shrink-0 w-5 h-5 border flex items-center justify-center transition-all duration-300"
              [class.border-gold]="item.aberto"
              [class.bg-gold/10]="item.aberto"
              [class.border-gold/25]="!item.aberto"
              [class.rotate-45]="item.aberto"
            >
              <svg class="w-2.5 h-2.5" [class.text-gold]="item.aberto" [class.text-slate-500]="!item.aberto"
                fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
            </span>
          </button>

          @if (item.aberto) {
            <div class="pb-5 pl-0">
              <p class="text-xs text-slate-500 leading-relaxed">{{ item.resposta }}</p>
            </div>
          }
        </div>
      }
    </div>

    <!-- Bottom CTA -->
    <div class="mt-12 border border-gold/15 p-8 text-center"
      style="background: linear-gradient(135deg, #0A1628 0%, #0F1F3D 100%)">
      <p class="text-xs text-gold/70 tracking-widest uppercase mb-2">Ainda tem dúvidas?</p>
      <p class="text-sm text-white font-semibold mb-1" style="font-family: var(--font-serif)">Nossa equipe está pronta para ajudar</p>
      <p class="text-xs text-slate-500 mb-6">Responderemos todas as suas perguntas antes da consulta.</p>
      <a
        href="https://wa.me/5500000000000?text=Ol%C3%A1%20Dr.%20Rodrigo%2C%20tenho%20algumas%20d%C3%BAvidas."
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center gap-2 border border-gold text-gold hover:bg-gold hover:text-navy-900 text-xs font-semibold tracking-wider px-6 py-2.5 uppercase transition-all"
      >
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Falar pelo WhatsApp
      </a>
    </div>
  </div>
</section>
