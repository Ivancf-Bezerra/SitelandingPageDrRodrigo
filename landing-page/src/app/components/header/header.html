<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b"
  [class.bg-navy-900]="isScrolled()"
  [class.shadow-lg]="isScrolled()"
  [class.shadow-black/40]="isScrolled()"
  [class.border-gold/15]="isScrolled()"
  [class.bg-navy-900/80]="!isScrolled()"
  [class.backdrop-blur-md]="!isScrolled()"
  [class.border-transparent]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14 lg:h-16">

      <!-- Logo -->
      <a [routerLink]="['/']" class="flex items-center gap-2.5" (click)="closeMenu()">
        <div class="w-8 h-8 rounded-full border border-gold flex items-center justify-center text-gold font-bold text-sm leading-none select-none">
          R
        </div>
        <div class="leading-tight">
          <p class="text-[10px] font-semibold text-gold tracking-[0.25em] uppercase">Dr.</p>
          <p class="text-sm font-bold text-white -mt-0.5 tracking-wide" style="font-family: var(--font-display)">Rodrigo</p>
        </div>
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden lg:flex items-center gap-6" aria-label="Navegação principal">
        @for (link of navLinks; track link.route) {
          <a
            [routerLink]="[link.route]"
            routerLinkActive="text-gold"
            [routerLinkActiveOptions]="{ exact: link.route === '/' }"
            class="text-xs font-medium tracking-wider text-slate-400 hover:text-gold uppercase transition-colors duration-200"
          >
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Desktop CTA -->
      <a
        [routerLink]="['/agendamento']"
        class="hidden lg:inline-flex items-center gap-2 rounded-md border border-gold text-gold hover:bg-gold hover:text-navy-900 text-xs font-semibold tracking-wider px-5 py-2 uppercase transition-all duration-200"
      >
        Agendar Consulta
      </a>

      <!-- Hamburger -->
      <button
        class="lg:hidden p-2 rounded-md text-slate-400 hover:text-gold transition-colors"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Abrir menu"
      >
        @if (menuOpen()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="lg:hidden bg-navy-800 border-t border-gold/15" role="dialog">
      <nav class="max-w-7xl mx-auto px-4 py-3 flex flex-col">
        @for (link of navLinks; track link.route) {
          <a
            [routerLink]="[link.route]"
            routerLinkActive="text-gold"
            [routerLinkActiveOptions]="{ exact: link.route === '/' }"
            class="text-xs font-medium tracking-wider text-slate-400 hover:text-gold uppercase py-3 border-b border-navy-700 transition-colors"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        }
        <a
          [routerLink]="['/agendamento']"
          class="mt-4 mb-2 text-center rounded-md border border-gold text-gold hover:bg-gold hover:text-navy-900 font-semibold text-xs tracking-wider px-5 py-3 uppercase transition-all"
          (click)="closeMenu()"
        >
          Agendar Consulta
        </a>
      </nav>
    </div>
  }
</header>
