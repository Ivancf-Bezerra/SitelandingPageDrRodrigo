<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="isScrolled()"
  [class.shadow-md]="isScrolled()"
  [class.bg-transparent]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-20">

      <!-- Logo -->
      <a href="#" class="flex items-center gap-3 group" (click)="closeMenu()">
        <div class="w-10 h-10 rounded-full bg-[#C9A84C] flex items-center justify-center text-white font-bold text-lg leading-none select-none">
          R
        </div>
        <div class="leading-tight">
          <p class="text-sm font-semibold text-[#C9A84C] tracking-widest uppercase">Dr.</p>
          <p class="text-base font-bold text-gray-900 -mt-1" style="font-family: var(--font-serif)">Rodrigo</p>
        </div>
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden lg:flex items-center gap-7" aria-label="Navegação principal">
        @for (link of navLinks; track link.anchor) {
          <a
            [href]="link.anchor"
            class="text-sm font-medium text-gray-700 hover:text-[#C9A84C] transition-colors duration-200 relative after:absolute after:bottom-[-4px] after:left-0 after:right-0 after:h-[2px] after:bg-[#C9A84C] after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:duration-200"
          >
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Desktop CTA -->
      <a
        href="#contato"
        class="hidden lg:inline-flex items-center gap-2 bg-[#C9A84C] hover:bg-[#a8852e] text-white text-sm font-semibold px-5 py-2.5 rounded-full transition-colors duration-200"
      >
        Agendar Consulta
      </a>

      <!-- Hamburger -->
      <button
        class="lg:hidden p-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Abrir menu"
      >
        @if (menuOpen()) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  @if (menuOpen()) {
    <div
      class="lg:hidden bg-white border-t border-gray-100 shadow-lg"
      role="dialog"
      aria-label="Menu de navegação"
    >
      <nav class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-1">
        @for (link of navLinks; track link.anchor) {
          <a
            [href]="link.anchor"
            class="text-base font-medium text-gray-700 hover:text-[#C9A84C] hover:bg-amber-50 px-4 py-3 rounded-lg transition-colors duration-200"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        }
        <a
          href="#contato"
          class="mt-3 text-center bg-[#C9A84C] hover:bg-[#a8852e] text-white font-semibold px-5 py-3 rounded-full transition-colors duration-200"
          (click)="closeMenu()"
        >
          Agendar Consulta
        </a>
      </nav>
    </div>
  }
</header>
