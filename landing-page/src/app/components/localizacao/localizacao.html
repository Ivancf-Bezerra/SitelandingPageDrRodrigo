<section id="localizacao" class="py-20 lg:py-28" style="background: #060E1A">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section Header -->
    <div class="mb-12">
      <div class="flex items-center gap-3 mb-3">
        <div class="gold-rule"></div>
        <span class="text-gold text-[10px] font-semibold tracking-[0.3em] uppercase">Como nos encontrar</span>
      </div>
      <h2 class="text-2xl sm:text-3xl font-bold text-white" style="font-family: var(--font-serif)">
        Nossa <span class="text-gold">Localização</span>
      </h2>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

      <!-- Info -->
      <div class="lg:col-span-1">
        <div class="border border-gold/15 p-6" style="background: #0A1628">
          <p class="text-xs font-bold text-white tracking-wider uppercase mb-5 pb-3 border-b border-gold/10">
            Clínica Dr. Rodrigo
          </p>

          <ul class="space-y-4 mb-6">
            <li class="flex items-start gap-3">
              <div class="w-7 h-7 border border-gold/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-gold/70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                </svg>
              </div>
              <div>
                <p class="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">Endereço</p>
                <p class="text-xs text-slate-300">Av. Exemplo, 1000 — Sala 01</p>
                <p class="text-xs text-slate-500">Cidade — UF · CEP: 00000-000</p>
              </div>
            </li>
            <li class="flex items-start gap-3">
              <div class="w-7 h-7 border border-gold/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-gold/70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <div>
                <p class="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">Horário</p>
                <p class="text-xs text-slate-300">Seg – Sex: 8h às 18h</p>
                <p class="text-xs text-slate-500">Sáb: 8h às 13h</p>
              </div>
            </li>
            <li class="flex items-start gap-3">
              <div class="w-7 h-7 border border-gold/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-gold/70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </div>
              <div>
                <p class="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">Telefone</p>
                <p class="text-xs text-slate-300">(00) 00000-0000</p>
              </div>
            </li>
          </ul>

          <a
            href="https://maps.google.com/?q=Av.+Exemplo,+1000"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center justify-center gap-2 border border-gold/30 text-gold/70 hover:border-gold hover:text-gold text-[11px] font-semibold tracking-wider py-2.5 uppercase transition-all"
          >
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
            Abrir no Maps
          </a>
        </div>
      </div>

      <!-- Map -->
      <div class="lg:col-span-2">
        <div class="border border-gold/15 overflow-hidden h-64 sm:h-72 lg:h-80">
          <iframe
            [src]="mapUrl"
            class="w-full h-full grayscale opacity-80"
            style="border:0; filter: grayscale(1) invert(0.85) contrast(0.9) brightness(0.8) hue-rotate(180deg);"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localização da clínica do Dr. Rodrigo"
          ></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
