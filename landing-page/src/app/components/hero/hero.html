<section
  id="hero"
  class="relative min-h-screen flex items-center overflow-hidden"
  style="background: linear-gradient(135deg, #030810 0%, #060E1A 40%, #0A1628 70%, #0F1F3D 100%)"
>
  <!-- Subtle grid pattern overlay -->
  <div class="absolute inset-0 opacity-[0.03] pointer-events-none" aria-hidden="true"
    style="background-image: linear-gradient(rgba(201,168,76,1) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,1) 1px, transparent 1px); background-size: 60px 60px">
  </div>

  <!-- Gradient glow -->
  <div class="absolute top-1/3 right-0 w-96 h-96 rounded-full pointer-events-none opacity-5" aria-hidden="true"
    style="background: radial-gradient(circle, #C9A84C 0%, transparent 70%)">
  </div>
  <div class="absolute bottom-0 left-1/4 w-72 h-72 rounded-full pointer-events-none opacity-5" aria-hidden="true"
    style="background: radial-gradient(circle, #1E3A5F 0%, transparent 70%)">
  </div>

  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full pt-20 pb-12 lg:pt-28 lg:pb-16">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-14 lg:gap-20 items-center">

      <!-- Text Content -->
      <div class="order-2 lg:order-1">

        <!-- Label -->
        <div class="flex items-center gap-3 mb-5">
          <div class="gold-rule"></div>
          <span class="text-gold text-[10px] font-semibold tracking-[0.3em] uppercase">
            Especialista em Otomodelação
          </span>
        </div>

        <h1
          class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white leading-tight mb-5"
          style="font-family: var(--font-display)"
        >
          Orelhas harmoniosas<br><span class="text-gold">sem cirurgia</span>, com resultado imediato
        </h1>

        <p class="text-sm text-slate-400 leading-relaxed mb-8 max-w-md">
          Técnica não cirúrgica que remodela e posiciona as orelhas de forma harmoniosa,
          sem cortes e sem cicatrizes. Resultado visível logo na primeira sessão.
        </p>

        <!-- CTAs -->
        <div class="flex flex-col sm:flex-row gap-3 mt-2">
          <a
            [routerLink]="['/agendamento']"
            class="inline-flex items-center justify-center gap-2 rounded-md bg-gold hover:bg-gold/90 text-navy-900 text-xs font-semibold tracking-wider px-6 py-3 uppercase transition-all"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Agendar Avaliação
          </a>
          <a
            href="https://wa.me/5500000000000?text=Ol%C3%A1%20Dr.%20Rodrigo%2C%20gostaria%20de%20saber%20mais%20sobre%20a%20Otomodela%C3%A7%C3%A3o."
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-center gap-2 rounded-md border border-gold/40 text-gold hover:border-gold hover:bg-gold/5 text-xs font-semibold tracking-wider px-6 py-3 uppercase transition-all"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Tirar Dúvidas
          </a>
        </div>
      </div>

      <!-- Image -->
      <div class="order-1 lg:order-2 flex justify-center">
        <div class="relative">
          <div
            class="w-64 h-80 sm:w-72 sm:h-96 lg:w-80 lg:h-[420px] overflow-hidden rounded-md border border-gold/25 relative"
            style="background: linear-gradient(160deg, #0F1F3D 0%, #0A1628 100%)"
          >
            <app-editable-image
              slotId="hero-retrato"
              [fallbackSrc]="''"
              alt="Dr. Rodrigo — especialista em Otomodelação"
              placeholderLabel="Foto do Dr. Rodrigo"
              wrapperClass="absolute inset-0 w-full h-full"
              imgClass="absolute inset-0 w-full h-full object-cover"
            />
          </div>
          <!-- Corner accent lines -->
          <div class="absolute top-0 left-0 w-5 h-5 border-t border-l border-gold/60" aria-hidden="true"></div>
          <div class="absolute top-0 right-0 w-5 h-5 border-t border-r border-gold/60" aria-hidden="true"></div>
          <div class="absolute bottom-0 left-0 w-5 h-5 border-b border-l border-gold/60" aria-hidden="true"></div>
          <div class="absolute bottom-0 right-0 w-5 h-5 border-b border-r border-gold/60" aria-hidden="true"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <a
    href="#servicos"
    class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 animate-bounce"
    aria-label="Ir para a próxima seção"
  >
    <p class="text-[9px] text-slate-500 tracking-[0.3em] uppercase">Scroll</p>
    <svg class="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </a>
</section>
